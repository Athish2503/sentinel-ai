version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      # Avoid mounting host node_modules or venv to prevent platform collision
      - /app/venv
      - /app/__pycache__
    environment:
      - DATABASE_URL=sqlite:///./kavalar.db
      - GROQ_API_KEY=your_groq_api_key_here
      - MODEL_NAME=llama-3.3-70b-versatile
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    restart: always
